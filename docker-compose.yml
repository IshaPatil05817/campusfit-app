services:
  app:
    build: .
    container_name: campusfit-app
    ports:
      - "3000:3000"
    environment:
      MONGO_URI: mongodb://mongodb:27017/campusfit
    depends_on:
      - mongodb

  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
