apiVersion: apps/v1
kind: Deployment
metadata:
  name: campusfit-app
  namespace: campusfit
spec:
  replicas: 2
  selector:
    matchLabels:
      app: campusfit-app
  template:
    metadata:
      labels:
        app: campusfit-app
    spec:
      containers:
        - name: campusfit-app
          image: inpatil/campusfit-app:v1
          ports:
            - containerPort: 3000
          env:
            - name: MONGO_URI
              value: mongodb://mongodb:27017/campusfit

            # ConfigMap values
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: campusfit-config
                  key: NODE_ENV

            - name: APP_NAME
              valueFrom:
                configMapKeyRef:
                  name: campusfit-config
                  key: APP_NAME

            # Secret value
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: campusfit-secret
                  key: DB_PASSWORD
